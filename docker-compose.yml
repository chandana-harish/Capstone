version: "3.9"

# ══════════════════════════════════════════════════════════════
#  Training Management System — Docker Compose (NO HEALTHCHECK)
# ══════════════════════════════════════════════════════════════

x-service-defaults: &service-defaults
  restart: unless-stopped
  networks:
    - tms-network

services:

  # ── MongoDB instances ──────────────────────────────────────

  auth-mongo:
    <<: *service-defaults
    image: mongo:7.0-jammy
    container_name: tms-auth-mongo
    volumes:
      - auth-mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: auth_db
    ports:
      - "27017:27017"

  user-mongo:
    <<: *service-defaults
    image: mongo:7.0-jammy
    container_name: tms-user-mongo
    volumes:
      - user-mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: user_db
    ports:
      - "27018:27017"

  training-mongo:
    <<: *service-defaults
    image: mongo:7.0-jammy
    container_name: tms-training-mongo
    volumes:
      - training-mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: training_db
    ports:
      - "27019:27017"

  attendance-mongo:
    <<: *service-defaults
    image: mongo:7.0-jammy
    container_name: tms-attendance-mongo
    volumes:
      - attendance-mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: attendance_db
    ports:
      - "27020:27017"

  # ── Backend services ───────────────────────────────────────

  auth-service:
    <<: *service-defaults
    build:
      context: ./services/auth-service
      dockerfile: Dockerfile
    container_name: tms-auth-service
    env_file:
      - ./services/auth-service/.env
    environment:
      MONGO_URI: mongodb://auth-mongo:27017/auth_db
    ports:
      - "4001:4001"

  user-service:
    <<: *service-defaults
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
    container_name: tms-user-service
    env_file:
      - ./services/user-service/.env
    environment:
      MONGO_URI: mongodb://user-mongo:27017/user_db
      AUTH_SERVICE_URL: http://auth-service:4001
    ports:
      - "4002:4002"

  training-service:
    <<: *service-defaults
    build:
      context: ./services/training-service
      dockerfile: Dockerfile
    container_name: tms-training-service
    env_file:
      - ./services/training-service/.env
    environment:
      MONGO_URI: mongodb://training-mongo:27017/training_db
      AUTH_SERVICE_URL: http://auth-service:4001
      USER_SERVICE_URL: http://user-service:4002
    ports:
      - "4003:4003"

  attendance-service:
    <<: *service-defaults
    build:
      context: ./services/attendance-service
      dockerfile: Dockerfile
    container_name: tms-attendance-service
    env_file:
      - ./services/attendance-service/.env
    environment:
      MONGO_URI: mongodb://attendance-mongo:27017/attendance_db
      AUTH_SERVICE_URL: http://auth-service:4001
      USER_SERVICE_URL: http://user-service:4002
      TRAINING_SERVICE_URL: http://training-service:4003
    ports:
      - "4004:4004"

  # ── Frontend ────────────────────────────────────────────────

  frontend:
    <<: *service-defaults
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tms-frontend
    ports:
      - "3000:80"

# ── Volumes ───────────────────────────────────────────────────

volumes:
  auth-mongo-data:
  user-mongo-data:
  training-mongo-data:
  attendance-mongo-data:

# ── Network ───────────────────────────────────────────────────

networks:
  tms-network:
    driver: bridge